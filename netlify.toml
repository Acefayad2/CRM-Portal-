[build]
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "TELNYX_PHONE_NUMBER,TELNYX_WEBHOOK_URL"

[[redirects]]
  from = "/api/telnyx/inbound"
  to = "/.netlify/functions/telnyx-inbound"
  status = 200

[[redirects]]
  from = "/api/telnyx/status"
  to = "/.netlify/functions/telnyx-status"
  status = 200
